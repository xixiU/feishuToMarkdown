<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞书文档转 Markdown</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 400px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f7f8fa;
        }

        /* 配置区域 */
        .config-section {
            background: white;
            padding: 16px 20px;
            border-bottom: 1px solid #e5e6eb;
        }
        .config-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #1f2329;
        }
        .config-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .config-option {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .config-option input[type="checkbox"] {
            margin-right: 8px;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .config-option label {
            font-size: 13px;
            color: #1f2329;
            cursor: pointer;
        }
        .config-sub-option {
            margin-left: 24px;
            margin-top: 8px;
            display: none;
        }
        .config-sub-option.show {
            display: block;
        }
        .config-sub-option label {
            font-size: 12px;
            color: #646a73;
            margin-left: 4px;
        }
        .config-sub-option input[type="radio"] {
            width: 14px;
            height: 14px;
            cursor: pointer;
        }

        /* 转换区域 */
        .converter-section {
            background: white;
            padding: 20px;
        }
        .section-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #1f2329;
        }
        .drop-zone {
            border: 2px dashed #d0d3d9;
            border-radius: 8px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }
        .drop-zone:hover, .drop-zone.drag-over {
            border-color: #0066FF;
            background: #f0f7ff;
        }
        .drop-zone-icon {
            font-size: 36px;
            margin-bottom: 8px;
        }
        .drop-zone-text {
            font-size: 13px;
            color: #646a73;
        }
        .file-input {
            display: none;
        }
        .file-info {
            display: none;
            background: #f0f7ff;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 12px;
            font-size: 12px;
            color: #1f2329;
        }
        .file-info.show {
            display: block;
        }
        .file-name {
            font-weight: 500;
            margin-bottom: 4px;
        }
        .file-size {
            color: #646a73;
            font-size: 11px;
        }
        .convert-btn {
            width: 100%;
            padding: 10px;
            background: #0066FF;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .convert-btn:hover:not(:disabled) {
            background: #0052CC;
        }
        .convert-btn:disabled {
            background: #d0d3d9;
            cursor: not-allowed;
        }
        .status {
            margin-top: 12px;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            text-align: center;
            display: none;
        }
        .status.show {
            display: block;
        }
        .status.loading {
            background: #fff7e6;
            color: #d46b08;
        }
        .status.success {
            background: #f0f9ff;
            color: #0958d9;
        }
        .status.error {
            background: #fff1f0;
            color: #cf1322;
        }
    </style>
</head>
<body>
    <!-- 配置区域 -->
    <div class="config-section">
        <div class="config-title">⚙️ 导出选项配置</div>
        <div class="config-options">
            <div class="config-option">
                <input type="checkbox" id="config-markdown" checked>
                <label for="config-markdown">导出 Markdown</label>
            </div>
            <div class="config-sub-option" id="image-type-option">
                <div style="display: flex; align-items: center; margin-bottom: 6px;">
                    <input type="radio" name="image-type" id="image-local" value="local" checked>
                    <label for="image-local">本地图片（ZIP）</label>
                </div>
                <div style="display: flex; align-items: center;">
                    <input type="radio" name="image-type" id="image-base64" value="base64">
                    <label for="image-base64">Base64 编码</label>
                </div>
            </div>
            <div class="config-option">
                <input type="checkbox" id="config-word" checked>
                <label for="config-word">下载 Word</label>
            </div>
            <div class="config-option">
                <input type="checkbox" id="config-pdf" checked>
                <label for="config-pdf">下载 PDF</label>
            </div>
        </div>
    </div>

    <!-- 转换区域 -->
    <div class="converter-section">
        <div class="section-title">📄 Word 转 Markdown</div>

        <div class="drop-zone" id="dropZone">
            <div class="drop-zone-icon">📄</div>
            <div class="drop-zone-text">拖拽 docx 文件或点击选择</div>
        </div>

        <input type="file" id="fileInput" class="file-input" accept=".docx">

        <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName"></div>
            <div class="file-size" id="fileSize"></div>
        </div>

        <button class="convert-btn" id="convertBtn" disabled>选择文件开始转换</button>

        <div class="status" id="status"></div>
    </div>

    <script src="libs/jszip.min.js"></script>
    <script src="libs/mammoth.browser.min.js"></script>
    <script src="libs/turndown.min.js"></script>
    <script src="popup.js"></script>
</body>
</html>
